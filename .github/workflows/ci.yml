name: protocol-ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  synthetic-protocol-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Compile Python sources
        run: python -m compileall -q scripts src tests
      - name: Run synthetic and protocol tests
        run: python -m pytest -q
      - name: Reject whitespace errors
        run: git diff --check

      # CI intentionally does not download KuaiRec or run a baseline/final
      # evaluation. Full raw-data verification is a separately reviewed local
      # operation; this workflow exercises only synthetic protocol behavior.
